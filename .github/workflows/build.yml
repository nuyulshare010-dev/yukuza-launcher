name: Launcher Android Tv

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 📌 Tambahan: ubah minSdkVersion menjadi 23
      - name: Set minSdk to 23
        run: |
          # Cari file build.gradle (asumsi Groovy DSL)
          if [ -f "app/build.gradle" ]; then
            sed -i 's/minSdkVersion .*/minSdkVersion 23/' app/build.gradle
          elif [ -f "app/build.gradle.kts" ]; then
            sed -i 's/minSdk = .*/minSdk = 23/' app/build.gradle.kts
          else
            echo "File build.gradle tidak ditemukan!"
            exit 1
          fi
          # (Opsional) tampilkan isi untuk verifikasi
          cat app/build.gradle || cat app/build.gradle.kts

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Run unit tests
        run: ./gradlew test

      - name: Run lint checks
        run: ./gradlew lint

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore
